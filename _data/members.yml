  desc_lines: |
    みんなのお姉さん的存在。
    のんびりくつろいでいることが多いです。
    好きなものは窓辺と日向。
    静かに見守ってあげると安心します。落ち着きたい時に一緒に過ごしてください。

- id: member3
  name: モカ
  img: cat-member3.jpg
  width: 1200
  height: 1600
  desc_lines: |
    ちょっと人見知りだけど、おやつをあげるとうれしそうに食べてくれます。
    好きなものはツナとチキンジャーキー。
    最初は少し距離をとりますが、静かに待ってあげると近づいてきます。
    優しく見守ってあげてください。

- id: member4
  name: そら
  img: cat-member4.jpg
  width: 1200
  height: 1600
  desc_lines: |
    撫でられるのが大好きな甘えん坊です。
    好きなものは頭なでとブラッシング。
    自分から寄ってきたら、頭やほっぺをゆっくり撫でてあげてください。長く一緒にいられる子です。
